name = "onlinexame"
main = "src/index.js"
compatibility_date = "2025-07-18"

# 环境变量
[vars]
ADMIN_API_KEY = "F7C9A8F491009BBB736DEA2AEC92E5E86E8E986E1CDF59D164129003895DC6EC"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "EXAM_KV"
id = "exam_kv_namespace"
preview_id = "exam_kv_namespace_preview"

# 静态资源绑定 - Workers Assets
[assets]
binding = "ASSETS"
directory = "./public"

# 开发环境配置
[env.dev]
name = "onlinexame-dev"

# 生产环境配置
[env.production]
name = "onlinexame"
